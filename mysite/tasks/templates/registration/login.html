{% extends "base.html" %}

{% block title %}Prisijungimas{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h1 class="mb-4 text-center">Prisijungimas</h1>

            <form method="post">
                {% csrf_token %}
                {% load crispy_forms_tags %}
                {{ form | crispy }}
                <button type="submit" class="btn btn-primary w-100">Prisijungti</button>
                <input type="hidden" name="next" value="{{ next }}"/>
            </form>

            <div class="mt-4 text-center">
                <a href="{% url 'password_reset' %}">Pamiršote slaptažodį?</a>
            </div>
            <div class="text-center mt-1">
                <a href="{% url 'signup' %}">Neturite paskyros? Registruokitės</a>
            </div>

        </div>
    </div>
</div>
{% endblock %}
