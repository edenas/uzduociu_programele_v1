{% extends 'base.html' %}
{% block title %}Užduoties forma{% endblock %}
{% block content %}

<h1 class="mb-4">Užduoties kūrimas / redagavimas</h1>

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {% load crispy_forms_tags %}
    {{ form | crispy }}

    <button type="submit" class="btn btn-primary py-2 px-5 mt-4">Išsaugoti</button>
</form>

{% endblock %}
